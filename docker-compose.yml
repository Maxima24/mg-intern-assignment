name: mango-esign

# Full stack for an India VPS: Postgres + NestJS api + Next.js web + Caddy (auto-TLS),
# all behind one domain. Copy .env.compose.example -> .env and fill it in, then:
#   docker compose up -d --build
# Everything egresses from the VPS IP, which must be allow-listed by Setu.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mango
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: mango_esign
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mango -d mango_esign']
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: '4000'
      DATABASE_URL: postgresql://mango:${POSTGRES_PASSWORD}@postgres:5432/mango_esign?schema=public
      CORS_ORIGINS: https://${APP_DOMAIN}
      SETU_PROVIDER: ${SETU_PROVIDER:-live}
      SETU_BASE_URL: ${SETU_BASE_URL:-https://dg-sandbox.setu.co}
      SETU_CLIENT_ID: ${SETU_CLIENT_ID}
      SETU_CLIENT_SECRET: ${SETU_CLIENT_SECRET}
      SETU_PRODUCT_INSTANCE_ID: ${SETU_PRODUCT_INSTANCE_ID}
      SETU_WEBHOOK_SECRET: ${SETU_WEBHOOK_SECRET}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-r2}
      R2_BUCKET: ${R2_BUCKET}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_REGION: ${R2_REGION:-auto}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4000/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
    expose:
      - '4000'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: https://${APP_DOMAIN}/api
        NEXT_PUBLIC_SITE_URL: https://${APP_DOMAIN}
    restart: unless-stopped
    depends_on:
      - api
    expose:
      - '3000'

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - '80:80'
      - '443:443'
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:

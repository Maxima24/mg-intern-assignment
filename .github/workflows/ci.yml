name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mango
          POSTGRES_PASSWORD: mango
          POSTGRES_DB: mango_esign
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mango -d mango_esign"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      DATABASE_URL: postgresql://mango:mango@localhost:5432/mango_esign?schema=public
      # Public web config needed for `next build` (validated at build time).
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/api
      NEXT_PUBLIC_SITE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter api exec prisma generate

      - name: Build shared contract
        run: pnpm --filter @mango/shared build

      - name: Typecheck
        run: pnpm turbo run typecheck

      - name: Lint
        run: pnpm turbo run lint

      - name: Apply migrations
        run: pnpm --filter api exec prisma migrate deploy

      - name: Unit tests
        run: pnpm --filter api test

      - name: E2E tests
        run: pnpm --filter api test:e2e

      - name: Build
        run: pnpm turbo run build
